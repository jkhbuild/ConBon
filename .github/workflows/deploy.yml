# ConBon — build images and deploy to the VPS on push to main.
#
# Pipeline: check → build-and-push → deploy. Sequential — a failing
# typecheck never reaches the build step; a failed push to GHCR never
# reaches the VPS.
#
# Triggers:
#   - push to main: full pipeline, uses commit SHA as the image tag
#   - workflow_dispatch: same, useful for re-deploying without a code push
#
# Rollback: SSH to the VPS, set IMAGE_TAG=<old-sha> in /opt/conbon/.env.production,
# run `bash scripts/deploy.sh <old-sha>`. The previous image still lives on
# GHCR under its SHA tag. (workflow_dispatch is also fine for redeploying the
# current main but won't pull a historical SHA without code revert.) See
# README "Rollback" for details.

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Never cancel an in-flight deploy — half-pulled state on the VPS is
# worse than the next deploy queueing for a couple minutes.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  # Dummy DATABASE_URL needed across:
  #   - `npm ci` postinstall → `prisma generate` loads prisma.config.ts
  #     which resolves env("DATABASE_URL") strictly.
  #   - `next build` → lib/db.ts validates the URL eagerly.
  # Neither path opens a real connection. The real URL comes from compose
  # on the VPS at runtime.
  DATABASE_URL: postgresql://build:build@localhost:5432/build

jobs:
  check:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build

  build-and-push:
    name: Build and push images to GHCR
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        # GHCR namespace and image names must be lowercase. The owner
        # `jkhbuild` is already lowercase but using ${{ env.IMAGE_NAMESPACE }}
        # directly stays portable if the repo is ever forked.
        run: echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/conbon-app:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/conbon-app:latest
          # gha cache scoped per target — runner and migrator share the
          # `deps` layer but diverge thereafter; separate scopes keep each
          # target's cache clean and avoid mutual eviction.
          cache-from: type=gha,scope=runner
          cache-to: type=gha,scope=runner,mode=max

      - name: Build and push migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrator
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/conbon-migrate:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/conbon-migrate:latest
          cache-from: type=gha,scope=migrator
          cache-to: type=gha,scope=migrator,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # GitHub Environment named "production" — adds a deploy log entry and
    # gates the job on environment protection rules if any are configured
    # in repo Settings → Environments.
    environment:
      name: production
      url: https://${{ vars.DOMAIN }}
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # SHA256 fingerprint of the VPS's SSH host key — pins the
          # connection against MITM. Generate with:
          #   ssh-keyscan -t ed25519 <host> | ssh-keygen -lf - | awk '{print $2}'
          # When unset, the action falls back to StrictHostKeyChecking=no,
          # which works but is MITM-vulnerable. Strongly recommended to set.
          fingerprint: ${{ secrets.DEPLOY_FINGERPRINT }}
          script: |
            set -euo pipefail
            cd /opt/conbon
            # Pull latest compose / Caddyfile / scripts before running the
            # deploy script — the script that's about to execute IS the
            # new version, so any deploy.sh fix lands on the same commit.
            git fetch --all --quiet
            git reset --hard origin/main
            bash scripts/deploy.sh ${{ needs.build-and-push.outputs.image_tag }}
